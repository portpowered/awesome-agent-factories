name: Awesome Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  awesome-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Local equivalent: npx awesome-lint (requires Node.js)
      - name: "Run awesome-lint (local: npx awesome-lint)"
        run: npx awesome-lint

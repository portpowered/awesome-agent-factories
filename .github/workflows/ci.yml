name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  go-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Download dependencies
        run: go mod download

      - name: Format check
        run: test -z "$(gofmt -l internal)"

      - name: Go tests
        run: go test ./...

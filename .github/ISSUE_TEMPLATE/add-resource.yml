name: Suggest a resource
description: Propose a resource for the list before opening a pull request. Maintainers can confirm scope and section fit early.
title: "Add: "
labels:
  - needs-scope-review
body:
  - type: markdown
    attributes:
      value: |
        Use this form to propose a resource for **Awesome AI Agent Factories**. Issues are optional pre-flight; the list change still requires a pull request that adds **one resource only**.

        Read [CONTRIBUTING.md](https://github.com/portpowered/awesome-agent-factories/blob/main/CONTRIBUTING.md) for entry format, scope rules, and local checks before you submit.

  - type: input
    id: name
    attributes:
      label: Resource name
      description: Official project, paper, or article title (exact name used as README link text).
      placeholder: AutoGen
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Canonical URL
      description: Primary homepage, paper page, or article URL for the resource.
      placeholder: https://github.com/microsoft/autogen
    validations:
      required: true

  - type: dropdown
    id: section
    attributes:
      label: README section
      description: Choose the section that best matches the resource type. See docs/taxonomy.md when section fit is unclear.
      options:
        - Theories
        - Coordination Patterns
        - Frameworks
        - Protocols and Interfaces
        - Benchmarks
        - Research Papers
        - Blog Posts
        - Case Studies
        - Examples and Templates
        - Related Lists
    validations:
      required: true

  - type: textarea
    id: relevance
    attributes:
      label: Why does this resource fit agent-factory scope?
      description: |
        Explain how the resource helps people manage groups of agents or their flows (for example coordination, orchestration, delegation, routing, handoffs, shared state, or group-level evaluation). Use factual, concise language.
      placeholder: |
        A framework for building multi-agent applications with conversable agents and group chat orchestration.
    validations:
      required: true
